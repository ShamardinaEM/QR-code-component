<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <title>Frontend Mentor | QR code component</title>
    </head>
    <body>
        <style>
            * {
                font-family: Outfit, serif;
                box-sizing: border-box;
            }
            body {
                min-height: 98vh;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                background-color: hsl(212, 45%, 89%);
            }
            .wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                background-color: white;
                padding: 15px;
                width: 300px;
                border-radius: 10px;
                margin: auto 0;
            }
            .wrapper img {
                border-radius: 10px;
                width: 270px;
            }
            .container {
                padding: 0 10px;
            }
            h3 {
                font-size: 20px;
                color: hsl(218, 44%, 22%);
            }
            p {
                font-size: 15px;
                color: hsl(216, 15%, 48%);
            }
            footer {
                color: hsl(216, 15%, 48%);
            }
            footer a {
                color: hsl(217, 100%, 30%);
            }
        </style>
        <div class="wrapper">
            <img src="./images/image-qr-code.png" alt="QR-code" />
            <div class="container">
                <h3>Improve your front-end skills by building projects</h3>
                <p>
                    Scan the QR code to visit Frontend Mentor and take your
                    coding skills to the next level
                </p>
            </div>
        </div>
        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                >Frontend Mentor</a
            >. Coded by
            <a href="https://github.com/ShamardinaEM" target="_blank"
                >ShamardinaEM</a
            >.
        </footer>
    </body>
</html>
